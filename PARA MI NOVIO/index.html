<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presiona aqui❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#ffe8ef,#fff8fb);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:600px;
    background:white;
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    animation:aparecer .8s;
}

h1{
    color:#ff5d8f;
    margin-bottom:20px;
}

p{
    font-size:20px;
    color:#555;
    line-height:1.8;
    min-height:170px;
}

button{
    margin-top:30px;
    background:#ff5d8f;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff4179;
}

.fade{
    animation:fade .6s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>

</head>

<body>

<div class="card">

<h1 id="titulo">oal 🐱</h1>

<p id="texto">
<br><br>Tengo algo que decirte...
</p>

<button onclick="siguiente()">
presiona aqui o me muero
</button>

</div>

<script>

let paso = 0;

function siguiente(){

const titulo = document.getElementById("titulo");
const texto = document.getElementById("texto");
const boton = document.querySelector("button");

texto.classList.remove("fade");
void texto.offsetWidth;
texto.classList.add("fade");

paso++;

switch(paso){

case 1:

titulo.innerHTML="✨";

texto.innerHTML=
`Hoy hiciste algo que por mucho tiempo 
sobrepensaste jeje
y puede parecer algo pequeño...

pero no lo es.`;
boton.innerHTML="PRESIONAMEEE";

break;

case 2:

titulo.innerHTML="💙";

texto.innerHTML=
`Aunque ya te sientas mas tranquilo

tu cabeza puede que comience a generar mil escenarios.

Pero bien sabes lo normal que es (o w o)"/.`;
boton.innerHTML="boton gei";

break;

case 3:

titulo.innerHTML="🦐";

texto.innerHTML=
`Solo quería recordarte algo...

No necesitas demostrarle quien eres a un trabajo,

porque tu valor ya estaba ahí mucho antes de esa "platica" :p.`;
boton.innerHTML="peru es clave";

break;

case 4:

titulo.innerHTML="🌼";

texto.innerHTML=
`Si te eligen...

voy a alegrarme muchísimo por ti 🫡.

Y si no sucede esta vez...

me seguira enorgulleciendo todo lo inteligente y lindo que eres 💕.`;
boton.innerHTML="ademas de estar chichon";

break;

case 5:

titulo.innerHTML="❤️";

texto.innerHTML=
`Porque intentarlo ya fue un gran paso.

Porque enfrentaste tus pensamientos intrusivos ñañarosos 

y eso merece sentirse orgulloso.`;
boton.innerHTML="boton ansioso deberas";

break;

case 6:

titulo.innerHTML="🦐";

texto.innerHTML=
`Pase lo que pase...

Solo quiero que sepas que te amo

y me alegra enormemente estar contigo apoyandote.

Todo saldra bien, porque asi lo manifeste jeje. ❤️`;

boton.innerHTML="Final?";

break;

case 7:

titulo.innerHTML="🤓";

texto.innerHTML=
`Ademas...

No olvides que tienen que derribar mitikah entera

para detenerte...ah...y que son como 5 tonos mas oscuros

que tú JAJAJ`;

boton.innerHTML="Final 🙊";

break;

case 8:
document.body.innerHTML=`
<div style="display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffe8ef,#fff8fb);">
<img
src="veso.jpg"
width="250"
style="border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,.2);">

<div style="text-align:center;
font-family:Poppins;">

<h1 style="font-size:70px;">🌸</h1>

<h2 style="margin-top:20px;color:#ff5d8f;">
Lo lograrás.
</h2>

<p style="margin-top:20px;font-size:22px;color:#555;">
Con mucho amor.<br><br>tu novia,<br><br> la programadora inexperta
</p>

</div>

</div>`;


break;

}

}

</script>

</body>
</html>
